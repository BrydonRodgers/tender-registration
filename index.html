<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROD Tenders - Company Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            font-size: 16px;
            opacity: 0.95;
            font-weight: 300;
        }

        .content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1f2937;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #1e40af;
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .required {
            color: #dc2626;
        }

        .form-info {
            background: #f3f4f6;
            border-left: 4px solid #1e40af;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            color: #374151;
            margin-bottom: 24px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(30, 64, 175, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            background: #dcfce7;
            color: #166534;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #bbf7d0;
        }

        .error-message {
            display: none;
            background: #fee2e2;
            color: #991b1b;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #fecaca;
        }

        .footer {
            text-align: center;
            padding: 20px 30px;
            background: #f9fafb;
            border-top: 1px solid #e5e7eb;
            font-size: 12px;
            color: #6b7280;
        }

        .footer a {
            color: #1e40af;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .industry-select {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BROD Tenders</h1>
            <p>Tender Bidding System Registration</p>
        </div>

        <div class="content">
            <div class="success-message" id="successMsg">
                ✓ Registration successful! We'll contact you shortly.
            </div>
            <div class="error-message" id="errorMsg"></div>

            <div class="form-info">
                Register your company to participate in tender bidding. All fields marked with <span class="required">*</span> are required.
            </div>

            <form id="registrationForm">
                <!-- Company Info -->
                <div class="form-group">
                    <label for="companyName">Company Name <span class="required">*</span></label>
                    <input type="text" id="companyName" name="companyName" required placeholder="Legal company name">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="taxId">Tax ID / VAT Number <span class="required">*</span></label>
                        <input type="text" id="taxId" name="taxId" required placeholder="e.g., 1234567890">
                    </div>
                    <div class="form-group">
                        <label for="regNumber">Registration Number <span class="required">*</span></label>
                        <input type="text" id="regNumber" name="regNumber" required placeholder="e.g., 2025/123456/07">
                    </div>
                </div>

                <!-- Contact Person -->
                <div class="form-group">
                    <label for="contactName">Contact Person Name <span class="required">*</span></label>
                    <input type="text" id="contactName" name="contactName" required placeholder="Full name">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email Address <span class="required">*</span></label>
                        <input type="email" id="email" name="email" required placeholder="your@company.com">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number <span class="required">*</span></label>
                        <input type="tel" id="phone" name="phone" required placeholder="+27 123 456 7890">
                    </div>
                </div>

                <!-- Company Details -->
                <div class="form-group">
                    <label for="industry">Industry / Sector <span class="required">*</span></label>
                    <select id="industry" name="industry" required>
                        <option value="">-- Select Industry --</option>
                        <option value="construction">Construction & Infrastructure</option>
                        <option value="catering">Catering & Food Services</option>
                        <option value="cleaning">Cleaning & Maintenance</option>
                        <option value="marketing">Marketing & Advertising</option>
                        <option value="consulting">Consulting & Professional Services</option>
                        <option value="logistics">Logistics & Transport</option>
                        <option value="security">Security & Safety</option>
                        <option value="technology">Technology & Software</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="address">Business Address <span class="required">*</span></label>
                    <textarea id="address" name="address" required placeholder="Street, City, Province, Postal Code"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City / Town <span class="required">*</span></label>
                        <input type="text" id="city" name="city" required placeholder="Langebaan">
                    </div>
                    <div class="form-group">
                        <label for="province">Province <span class="required">*</span></label>
                        <input type="text" id="province" name="province" required placeholder="Western Cape">
                    </div>
                </div>

                <!-- Expertise -->
                <div class="form-group">
                    <label for="services">Services/Expertise <span class="required">*</span></label>
                    <textarea id="services" name="services" required placeholder="Describe your company's key services and expertise..."></textarea>
                </div>

                <!-- Terms -->
                <div class="form-group">
                    <input type="checkbox" id="terms" name="terms" required style="width: auto; margin-right: 8px;">
                    <label for="terms" style="display: inline; font-weight: 400;">
                        I confirm that the information provided is accurate and complete.
                    </label>
                </div>

                <button type="submit" class="btn-submit">
                    <div class="btn-content">
                        <span class="spinner" id="spinner"></span>
                        <span id="btnText">Register Company</span>
                    </div>
                </button>
            </form>
        </div>

        <div class="footer">
            <p>&copy; 2026 BROD TRADERS. All rights reserved. | <a href="mailto:brodgerstraders@gmail.com">Contact Support</a></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');
        const submitBtn = document.querySelector('.btn-submit');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');

        // Telegram bot token and chat ID
        const TELEGRAM_BOT_TOKEN = '8630088980:AAG7CTS96crpzgb1fQ7sdxOLcT8OeO7C_ds';
        const TELEGRAM_CHAT_ID = '7778455248';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validate form
            if (!form.checkValidity()) {
                showError('Please fill in all required fields.');
                return;
            }

            // Collect form data
            const formData = {
                companyName: document.getElementById('companyName').value,
                taxId: document.getElementById('taxId').value,
                regNumber: document.getElementById('regNumber').value,
                contactName: document.getElementById('contactName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                industry: document.getElementById('industry').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                province: document.getElementById('province').value,
                services: document.getElementById('services').value,
                timestamp: new Date().toISOString()
            };

            // Show loading state
            submitBtn.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.textContent = 'Registering...';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            try {
                // Send to Telegram
                const message = `
🏢 **NEW TENDER REGISTRATION**

**Company:** ${formData.companyName}
**Tax ID:** ${formData.taxId}
**Registration:** ${formData.regNumber}

**Contact Person:** ${formData.contactName}
**Email:** ${formData.email}
**Phone:** ${formData.phone}

**Industry:** ${formData.industry}
**City:** ${formData.city}
**Province:** ${formData.province}

**Address:** ${formData.address}

**Services:** ${formData.services}

**Registered:** ${new Date(formData.timestamp).toLocaleString('en-ZA', { timeZone: 'Africa/Johannesburg' })}
                `.trim();

                const telegramUrl = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

                const response = await fetch(telegramUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                if (!response.ok) {
                    throw new Error('Telegram notification failed');
                }

                // Also save to localStorage as backup
                const registrations = JSON.parse(localStorage.getItem('tender_registrations') || '[]');
                registrations.push(formData);
                localStorage.setItem('tender_registrations', JSON.stringify(registrations));

                // Show success
                successMsg.style.display = 'block';
                form.reset();

                // Hide success after 5 seconds
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 5000);

            } catch (error) {
                console.error('Error:', error);
                showError('Registration failed. Please try again or contact support.');
            } finally {
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Register Company';
            }
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }

        // Dev: Show all registrations in console
        window.showRegistrations = () => {
            const data = JSON.parse(localStorage.getItem('tender_registrations') || '[]');
            console.table(data);
            return data;
        };
    </script>
</body>
</html>
